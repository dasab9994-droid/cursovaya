# Параметры подключения к MySQL.
# ВНИМАНИЕ: 8080 — это порт веб-интерфейса phpMyAdmin, а не порт самого MySQL-сервера.
# Порт самого MySQL обычно 3306 (значение по умолчанию для XAMPP/стандартной установки) —
# при необходимости поменяйте на ваш реальный порт.
db.host=localhost
